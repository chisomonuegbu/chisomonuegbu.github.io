# ─────────────────────────────────────────────────────────────────────────────
# Site
# ─────────────────────────────────────────────────────────────────────────────

theme: jekyll-theme-chirpy

lang: en
timezone: America/Toronto

title: Chisom Onuegbu
tagline: Writing about the systems I build at home and at work
description: >-
  Notes, deep dives, and postmortems on infrastructure, DevOps, and the
  homelab. Written by Chisom Onuegbu.

url: "https://chisomonuegbu.dev"

github:
  username: chisomonuegbu

# ─────────────────────────────────────────────────────────────────────────────
# Author
# ─────────────────────────────────────────────────────────────────────────────

social:
  name: Chisom Onuegbu
  email: chisom@chisomonuegbu.dev   # update once email routing is configured
  links:
    - https://github.com/chisomonuegbu
    # add LinkedIn / Mastodon / etc. here later if desired

# ─────────────────────────────────────────────────────────────────────────────
# Theme appearance
# ─────────────────────────────────────────────────────────────────────────────

# Force light mode for v1 — dark mode is built deliberately in Phase 3
theme_mode: light

# Avatar shown in the left sidebar. Place a square image at the path below
# (recommended 512×512 PNG, transparent background). For Phase 1 a typographic
# placeholder is fine; replace with a hand-drawn mark in Phase 4.
avatar:

# Open Graph image used when the site is shared on social media
social_preview_image:

toc: true   # right-sidebar TOC on posts

# ─────────────────────────────────────────────────────────────────────────────
# Comments — disabled for v1, revisit once there's an audience
# ─────────────────────────────────────────────────────────────────────────────

comments:
  provider:   # leave blank to disable
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en
    reactions_enabled: 1
    emit_metadata: 0

# ─────────────────────────────────────────────────────────────────────────────
# Analytics — left blank for v1; populated when Umami self-host is ready
# ─────────────────────────────────────────────────────────────────────────────

analytics:
  umami:
    id:           # e.g. "5f1a3b2c-..."
    domain:       # e.g. "analytics.chisomonuegbu.dev"
  goatcounter:
    id:
  google:
    id:
  cloudflare:
    id:

pageviews:
  provider:

# ─────────────────────────────────────────────────────────────────────────────
# Pagination & feed
# ─────────────────────────────────────────────────────────────────────────────

paginate: 10

# ─────────────────────────────────────────────────────────────────────────────
# Markdown / syntax highlighting
# ─────────────────────────────────────────────────────────────────────────────

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ─────────────────────────────────────────────────────────────────────────────
# Default front matter
# ─────────────────────────────────────────────────────────────────────────────

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false   # flip to true per-post once comments are enabled site-wide
      toc: true
      pin: false

  - scope:
      path: _drafts
    values:
      comments: false

# - scope:
#     path: ""
#     type: tabs
#   values:
#     layout: page
#     permalink: /:title/

# ─────────────────────────────────────────────────────────────────────────────
# Jekyll
# ─────────────────────────────────────────────────────────────────────────────

permalink: /posts/:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
